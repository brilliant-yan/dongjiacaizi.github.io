<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>来自董家才子的小问候 ✿</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-body">
  <div class="home-container">
    <h1 class="greeting">来自 董家才子 的小问候 <span class="flower">✿</span></h1>

    <div class="countdown-box">
      <p class="countdown-label" id="countdownLabel">距下班</p>
      <div class="countdown" id="countdown">--:--:--</div>
    </div>

    <div class="fun-quote" id="funQuote"></div>

    <nav class="card-nav">
      <a href="game.html" class="card card-game">
        <span class="card-icon">✈</span>
        <span class="card-title">摸鱼大作战</span>
        <span class="card-desc">击落老板派来的会议和DDL</span>
      </a>
      <a href="pet.html" class="card card-pet">
        <span class="card-icon">🐱</span>
        <span class="card-title">云养猫</span>
        <span class="card-desc">来撸一只赛博猫猫</span>
      </a>
      <a href="gallery.html" class="card card-gallery">
        <span class="card-icon">🖼</span>
        <span class="card-title">表情包库</span>
        <span class="card-desc">精选沙雕表情包自取</span>
      </a>
    </nav>

    <footer class="home-footer">
      <p>made with <span class="heart">♥</span> by 董家才子</p>
    </footer>
  </div>

  <script>
    const quotes = [
      "今天的你，也在努力假装很忙呢 ✨",
      "摸鱼不是偷懒，是灵魂的喘息 🐟",
      "距离周末还有亿点点，先摸会鱼吧 🎣",
      "你不是在上班，你是在给梦想攒路费 💰",
      "今天也是被闹钟背叛的一天 ⏰",
      "别急，下班铃总会响的，就像希望一样 🔔",
      "打工是不可能打工的...啊不对，正在打工 🫠",
      "你的代码能跑，但你的灵魂在报错 👻",
      "生活不止眼前的bug，还有远方的摸鱼 🌈",
    ];

    document.getElementById('funQuote').textContent =
      '「' + quotes[Math.floor(Math.random() * quotes.length)] + '」';

    function updateCountdown() {
      const now = new Date();
      const day = now.getDay();
      const hour = now.getHours();
      const label = document.getElementById('countdownLabel');
      const el = document.getElementById('countdown');

      let target;
      if (day === 0 || day === 6) {
        label.textContent = '距周一上班';
        target = new Date(now);
        target.setDate(target.getDate() + (day === 0 ? 1 : 2));
        target.setHours(9, 0, 0, 0);
      } else if (hour >= 18) {
        label.textContent = '距明天上班';
        target = new Date(now);
        target.setDate(target.getDate() + 1);
        target.setHours(9, 0, 0, 0);
      } else if (hour < 9) {
        label.textContent = '距上班';
        target = new Date(now);
        target.setHours(9, 0, 0, 0);
      } else {
        label.textContent = '距下班';
        target = new Date(now);
        target.setHours(18, 0, 0, 0);
      }

      const diff = Math.max(0, target - now);
      const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
      const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
      const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
      el.textContent = `${h}:${m}:${s}`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
